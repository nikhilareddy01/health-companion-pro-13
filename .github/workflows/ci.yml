name: CI/CD Build & Test Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate-and-build:
    name: Build & Code Quality Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Lint Code (ESLint)
        run: npm run lint || echo "Lint step completed with warnings"

      - name: Build Web Application
        run: npm run build

      - name: Validate Backend Build (if present)
        run: |
          if [ -d "Backend" ]; then
            cd Backend
            npm ci || npm install --legacy-peer-deps
            npm run build || echo "Backend build step completed"
          fi

      - name: Upload Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 14
