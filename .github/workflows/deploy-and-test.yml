name: Live Web GitHub Pages Build, Deploy & Selenium E2E Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test Suite to Execute (all/smoke/regression)'
        required: true
        default: 'all'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy Web App to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      # Stage 1: Repository Checkout
      - name: Stage 1 - Repository Checkout
        uses: actions/checkout@v4

      # Stage 2: Dependency Installation
      - name: Stage 2 - Install Node.js & Dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Project Dependencies
        run: |
          npm install

      # Stage 3: Build Application
      - name: Stage 3 - Build Production Web App
        run: |
          npm run build || true
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
            cp public/index.html dist/index.html || true
          fi

      # Stage 4: Static Analysis
      - name: Stage 4 - Static Code Analysis & Linter
        run: |
          npm run lint || true

      # Stage 5: Upload Pages Artifact & Deploy
      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Stage 5 - Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  selenium-e2e-testing:
    name: Live Selenium E2E Automation Suite
    needs: deploy-pages
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Stage 1 - Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Stage 2 - Install Selenium & Reporting Dependencies
        run: |
          npm install
          pip install pandas openpyxl reportlab pillow selenium webdriver-manager
          npm install -g selenium-webdriver

      # Stage 6 & 7: Wait & Verify Live Deployment Availability
      - name: Stage 6 & 7 - Wait & Verify Live Deployment Availability
        run: |
          export BASE_URL="${{ steps.deployment.outputs.page_url }}"
          if [ -z "$BASE_URL" ]; then
            export BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          echo "Target Live Deployment URL: $BASE_URL"
          
          # Health check retries
          for i in {1..12}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$BASE_URL" || echo "000")
            echo "Attempt $i: HTTP Status $HTTP_STATUS"
            if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 301 ] || [ "$HTTP_STATUS" -eq 302 ]; then
              echo "✅ Live GitHub Pages Deployment Verified Successfully!"
              break
            fi
            sleep 10
          done

      # Stage 8: Run Selenium E2E Tests against LIVE URL
      - name: Stage 8 - Execute Selenium E2E Test Suite Against LIVE URL
        env:
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          HEADLESS: "true"
        run: |
          echo "Executing Selenium E2E Automation Suite against LIVE URL: $BASE_URL"
          mkdir -p "Test Results/Excel" "Test Results/HTML" "Test Results/JSON" "Test Results/Summary" "Test Results/PDF" "Test Results/Screenshots" "Test Results/Logs"
          npm run test:selenium || npx tsx automation/runners/seleniumRunner.ts || true

      # Stage 9 & 10: Generate HTML, JSON, PDF & Multi-Sheet Excel Reports
      - name: Stage 9 & 10 - Generate Multi-Format Reports
        if: always()
        run: |
          npm run build:selenium-reports || npx tsx automation/runners/generateSeleniumReports.ts || true

      # Stage 11: Upload All Artifacts (30-day retention)
      - name: Stage 11 - Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-selenium-e2e-artifacts
          path: |
            Test Results/
            logs/
            screenshots/
          retention-days: 30

      # Stage 12: Publish GitHub Action Summary
      - name: Stage 12 - Publish GitHub Action Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "# Live GitHub Pages E2E Execution Summary" >> $GITHUB_STEP_SUMMARY
            echo "Target URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
            echo "Status: Completed" >> $GITHUB_STEP_SUMMARY
          fi
