name: Backend DevSecOps Security & Dependency Review

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  security-audit:
    name: Backend Security Review & SAST/DAST Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect Framework & Install Backend Dependencies
        run: |
          if [ -d "Backend" ]; then
            cd Backend
            npm install
          fi

      - name: Run Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
        continue-on-error: true

      - name: Run Backend Unit & Security Checks
        run: |
          if [ -d "Backend" ]; then
            cd Backend
            npm run lint || true
          fi

      - name: Upload Security Findings & Inventories
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-security-assessment-results
          path: Vulnerability Test Results/
          retention-days: 30
