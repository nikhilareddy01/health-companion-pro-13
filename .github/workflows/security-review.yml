name: DevSecOps Security & Dependency Review

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  security-audit:
    name: DevSecOps Security Review & SAST/DAST Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Detect & Install Backend Dependencies
        run: |
          if [ -d "Backend" ]; then
            cd Backend
            npm install
          fi

      - name: Run Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
        continue-on-error: true

      - name: Run Code Checks & Build Verification
        run: |
          npx tsc --noEmit
          npm run lint
          npm run build
          if [ -d "Backend" ]; then
            cd Backend
            npm run build || true
          fi

      - name: Ensure Findings Directory Exists
        run: |
          mkdir -p "Vulnerability Test Results"

      - name: Upload Security Findings & Inventories
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-assessment-results
          path: Vulnerability Test Results/
          if-no-files-found: ignore
          retention-days: 30
